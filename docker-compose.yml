version: '3.8'

services:
  # PostgreSQL - Knowledge Graph (Triple Store)
  db_graph:
    image: postgres:16-alpine
    container_name: atlas-postgres
    environment:
      - POSTGRES_DB=atlas_knowledge
      - POSTGRES_USER=atlas
      - POSTGRES_PASSWORD=atlas_secure_password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant - Vector Store
  db_vector:
    image: qdrant/qdrant:latest
    container_name: atlas-qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atlas-app
    environment:
      - POSTGRES_HOST=db_graph
      - POSTGRES_PORT=5432
      - POSTGRES_DB=atlas_knowledge
      - POSTGRES_USER=atlas
      - POSTGRES_PASSWORD=atlas_secure_password
      - QDRANT_HOST=db_vector
      - QDRANT_PORT=6333
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./backend/data/uploads:/app/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      db_graph:
        condition: service_healthy
      db_vector:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - atlas-network

networks:
  atlas-network:
    driver: bridge
