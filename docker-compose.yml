version: '3.8'

services:
  # PostgreSQL - Knowledge Graph (Triple Store)
  db_graph:
    image: postgres:16-alpine
    container_name: atlas-postgres
    environment:
      - POSTGRES_DB=atlas_knowledge
      - POSTGRES_USER=atlas
      - POSTGRES_PASSWORD=atlas_secure_password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant - Vector Store
  db_vector:
    image: qdrant/qdrant:latest
    container_name: atlas-qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data: