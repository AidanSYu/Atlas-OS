# DEPRECATED: This compose file is for reference only.
#
# Atlas 2.0 is now a Tauri desktop app. PostgreSQL and Qdrant
# are bundled as Windows sidecar executables, not Docker containers.
#
# This file is kept for historical reference (old Docker-based setup).
# It is NOT used in the current build pipeline or production deployment.
#
# For development with the Tauri desktop app:
#   npm run tauri:dev     # Backend/Postgres/Qdrant run as sidecars
#   npm run tauri:build   # Create Windows installer
#

version: '3.8'

services:
  # PostgreSQL - Knowledge Graph (Triple Store) - FOR REFERENCE ONLY
  db_graph:
    image: postgres:16-alpine
    container_name: atlas-postgres
    environment:
      - POSTGRES_DB=atlas_knowledge
      - POSTGRES_USER=atlas
      - POSTGRES_PASSWORD=atlas_secure_password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant - Vector Store - FOR REFERENCE ONLY
  db_vector:
    image: qdrant/qdrant:latest
    container_name: atlas-qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data: